template_metadata:
  id: appium-xcuitest-ios-real
  display_name: "Appium XCUITest — iOS Real Device"
  target_driver_summary: "XCUITest driver for real iOS devices (iPhone/iPad) via USB or network"
  source_pack_id: appium-xcuitest
  prerequisite_host_tools:
    - Xcode
    - node
    - npm
    - apple_devicectl
    - go-ios

schema_version: 1
id: local/xcuitest-ios-real
release: "2026.04.0"
display_name: "Appium XCUITest — iOS Real Device"
maintainer: ""
license: ""
requires:
  host_os: [macos]
appium_server:
  source: npm
  package: appium
  version: ">=2.5,<3"
  recommended: "2.19.0"
  known_bad: []
appium_driver:
  source: npm
  package: appium-xcuitest-driver
  version: ">=7,<10"
  recommended: "9.3.1"
  known_bad: ["9.0.0"]
platforms:
  - id: ios
    display_name: "iOS (real device)"
    automation_name: XCUITest
    appium_platform_name: iOS
    device_types: [real_device]
    connection_types: [usb, network]
    grid_slots: [native]
    capabilities:
      stereotype:
        "appium:platformName": "iOS"
        "appium:automationName": "XCUITest"
      session_required: []
    identity:
      scheme: apple_udid
      scope: global
    display:
      icon_kind: mobile
    health_checks:
      - id: devicectl_visible
        label: devicectl Visible
      - id: devicectl_paired
        label: Device Paired
      - id: devicectl_tunnel
        label: CoreDevice Tunnel
      - id: ios_booted
        label: OS Booted
      - id: developer_mode
        label: Developer Mode
      - id: ddi_services
        label: Developer Services
      - id: simulator_booted
        label: Simulator Booted
      - id: simulator_responsive
        label: Simulator Responsive
      - id: ping
        label: IP Reachable
      - id: ip_ping
        label: ICMP Reachable
        applies_when:
          connection_types: [usb]
          requires_ip_address: true
    lifecycle_actions:
      - id: state
      - id: reconnect
    connection_behavior:
      default_device_type: real_device
      default_connection_type: usb
      requires_ip_address: false
      requires_connection_target: true
    parallel_resources:
      ports:
        - capability_name: "appium:wdaLocalPort"
          start: 8100
        - capability_name: "appium:mjpegServerPort"
          start: 9100
      derived_data_path: true
