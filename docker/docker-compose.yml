services:
  postgres:
    image: postgres:18-bookworm
    environment:
      POSTGRES_USER: gridfleet
      POSTGRES_PASSWORD: gridfleet
      POSTGRES_DB: gridfleet
    ports:
      - "5432:5432"
    volumes:
      - pgdata18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridfleet"]
      interval: 5s
      timeout: 5s
      retries: 5

  router:
    build:
      context: ..
      dockerfile: router/Dockerfile
    ports:
      - "4444:4444"
    environment:
      GRIDFLEET_ROUTER_LISTEN: 0.0.0.0:4444
      GRIDFLEET_ROUTER_BACKEND: http://backend:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      GRIDFLEET_DATABASE_URL: postgresql+asyncpg://gridfleet:gridfleet@postgres:5432/gridfleet
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - driver-pack-storage:/var/lib/gridfleet/driver-packs
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - debug

volumes:
  pgdata18:
  driver-pack-storage:
