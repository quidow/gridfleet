name: Publish Relay

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Package index to publish to
        required: true
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  wheels:
    name: Wheel (${{ matrix.platform.runner }} ${{ matrix.platform.target }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64 }
          - { runner: ubuntu-24.04-arm, target: aarch64 }
          - { runner: macos-latest, target: aarch64 }
          - { runner: macos-latest, target: x86_64 }
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: relay-proxy
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
          before-script-linux: pip install cmake

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-publish-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: relay-proxy/dist

  publish:
    name: Publish gridfleet-agent-relay
    needs: wheels
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.repository }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: relay-publish-*
          merge-multiple: true
          path: dist

      - name: Publish to TestPyPI
        if: inputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: inputs.repository == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
