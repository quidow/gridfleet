name: Update lock files on release PRs

on:
  push:
    branches:
      - "release-please--**"
    paths:
      - "agent/pyproject.toml"
      - "backend/pyproject.toml"
      - "testkit/pyproject.toml"
      - "frontend/package.json"

permissions:
  contents: write

jobs:
  update-lockfiles:
    name: Update lock files
    runs-on: ubuntu-latest
    env:
      UV_LINK_MODE: copy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Update Python lock files
        run: |
          for pkg in agent backend testkit; do
            if git diff --name-only origin/main..HEAD | grep -q "^${pkg}/pyproject.toml"; then
              echo "Updating ${pkg}/uv.lock"
              cd "${pkg}" && uv lock && cd ..
            fi
          done

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update frontend lock file
        run: |
          if git diff --name-only origin/main..HEAD | grep -q "^frontend/package.json"; then
            echo "Updating frontend/package-lock.json"
            cd frontend && npm install --package-lock-only && cd ..
          fi

      - name: Commit updated lock files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "*/uv.lock" "frontend/package-lock.json"
          if git diff --cached --quiet; then
            echo "No lock file changes"
          else
            git commit -m "chore(deps): update lock files for version bump"
            git push
          fi
