name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commit Messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install commitlint
        run: npm install --save-dev @commitlint/{cli,config-conventional}

      - name: Lint commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gridfleet
          POSTGRES_PASSWORD: gridfleet
          POSTGRES_DB: gridfleet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gridfleet -d gridfleet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GRIDFLEET_DATABASE_URL: postgresql+asyncpg://gridfleet:gridfleet@127.0.0.1:5432/gridfleet
      UV_LINK_MODE: copy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: backend
          python-version: "3.12"
          cache-dependency-glob: |
            backend/pyproject.toml
            backend/uv.lock

      - name: Install dependencies
        working-directory: backend
        run: uv sync --extra dev
      - name: Check formatting
        working-directory: backend
        run: uv run --locked --extra dev ruff format --check app/ tests/

      - name: Lint
        working-directory: backend
        run: uv run --locked --extra dev ruff check app/ tests/

      - name: Type check
        working-directory: backend
        run: uv run --locked --extra dev mypy app/

      - name: Test
        working-directory: backend
        run: uv run --locked --extra dev pytest -q -n auto

  agent:
    name: Agent
    runs-on: ubuntu-latest
    env:
      UV_LINK_MODE: copy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: agent-v2
          python-version: "3.12"
          cache-dependency-glob: |
            agent/pyproject.toml
            agent/uv.lock

      - name: Install dependencies
        working-directory: agent
        run: uv sync --extra dev
      - name: Check formatting
        working-directory: agent
        run: uv run --locked --extra dev ruff format --check agent_app/ tests/

      - name: Lint
        working-directory: agent
        run: uv run --locked --extra dev ruff check agent_app/ tests/

      - name: Type check
        working-directory: agent
        run: uv run --locked --extra dev mypy agent_app/

      - name: Test
        working-directory: agent
        run: uv run --locked --extra dev pytest -q

      - name: Build package
        working-directory: agent
        run: uv build --no-sources

      - name: Smoke test built wheel
        working-directory: agent
        env:
          UV_NO_CACHE: "1"
        run: >
          uv run --isolated --no-project --with dist/*.whl --
          gridfleet-agent --version

      - name: Smoke test source distribution
        working-directory: agent
        env:
          UV_NO_CACHE: "1"
        run: >
          uv run --isolated --no-project --with dist/*.tar.gz --
          gridfleet-agent --version

  testkit:
    name: Testkit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      UV_LINK_MODE: copy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: testkit-${{ matrix.python-version }}-v2
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: |
            testkit/pyproject.toml
            testkit/uv.lock

      - name: Install dependencies
        working-directory: testkit
        run: uv sync --extra dev --extra appium
      - name: Check formatting
        working-directory: testkit
        run: uv run --locked --extra dev --extra appium ruff format --check gridfleet_testkit/ tests/ examples/

      - name: Lint
        working-directory: testkit
        run: uv run --locked --extra dev --extra appium ruff check gridfleet_testkit/ tests/ examples/

      - name: Type check
        working-directory: testkit
        run: uv run --locked --extra dev --extra appium mypy gridfleet_testkit/ tests/ examples/

      - name: Test
        working-directory: testkit
        run: uv run --locked --extra dev --extra appium pytest -q

      - name: Build package
        working-directory: testkit
        run: uv build --no-sources

      - name: Smoke test built wheel
        working-directory: testkit
        env:
          UV_NO_CACHE: "1"
        run: >
          uv run --isolated --no-project --with dist/*.whl --
          python -c "import gridfleet_testkit; assert gridfleet_testkit.__version__"

      - name: Smoke test source distribution
        working-directory: testkit
        env:
          UV_NO_CACHE: "1"
        run: >
          uv run --isolated --no-project --with dist/*.tar.gz --
          python -c "import gridfleet_testkit; assert gridfleet_testkit.__version__"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gridfleet
          POSTGRES_PASSWORD: gridfleet
          POSTGRES_DB: gridfleet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gridfleet -d gridfleet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GRIDFLEET_DATABASE_URL: postgresql+asyncpg://gridfleet:gridfleet@127.0.0.1:5432/gridfleet
      UV_LINK_MODE: copy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system deps
        working-directory: frontend
        run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Test mocked e2e
        working-directory: frontend
        run: npm run test:e2e:mocked

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: frontend
          python-version: "3.12"
          cache-dependency-glob: |
            backend/pyproject.toml
            backend/uv.lock

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --extra dev
      - name: Run backend migrations
        working-directory: backend
        run: uv run --locked --extra dev alembic upgrade head

      - name: Test live e2e
        working-directory: frontend
        run: npm run test:e2e:live

  compose-smoke:
    name: Compose Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and start stack
        working-directory: docker
        run: docker compose up --build -d

      - name: Wait for stack to stabilize
        run: sleep 15

      - name: Check no containers exited
        working-directory: docker
        run: |
          exited=$(docker compose ps --status exited -q)
          if [ -n "$exited" ]; then
            echo "Containers exited unexpectedly:"
            docker compose ps
            exit 1
          fi

      - name: Verify frontend responds
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:3000/ > /dev/null; do sleep 2; done'

      - name: Verify backend health
        run: |
          timeout 30 bash -c 'until curl -sf http://localhost:8000/health/live > /dev/null; do sleep 2; done'

      - name: Dump logs on failure
        if: failure()
        working-directory: docker
        run: docker compose logs --tail 100

      - name: Tear down
        if: always()
        working-directory: docker
        run: docker compose down -v
