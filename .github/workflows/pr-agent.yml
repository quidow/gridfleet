name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-agent-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: PR Agent Review
    if: >-
      github.event.pull_request.head.repo.fork == false
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    # Hard kill so a hung LiteLLM/Ollama Cloud call cannot burn 30 min of CI when
    # `config.ai_timeout` fails to fire (observed on the streaming /api/chat path).
    timeout-minutes: 20
    steps:
      - name: PR Agent action
        # Pinned 2026-05-19 (release 0.35.0). Bump after observing upstream main for breaking changes.
        uses: the-pr-agent/pr-agent@0bd56c0508504c718cc03d504cd4ceb6725ba3c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

          # Model routing.
          # `ollama_chat/` (not `ollama/`) is intentional — it routes through
          # LiteLLM to Ollama's /api/chat endpoint, which applies the chat template
          # required by instruct-tuned models. PR-Agent's docs only show `ollama/`
          # (the legacy /api/generate endpoint) but pass the prefix through to
          # LiteLLM unchanged, so both work.
          #
          # Must be a NON-thinking model. PR-Agent's `auto_improve` (code
          # suggestions) prompt makes a reasoning model think past Ollama Cloud's
          # 16384-token output cap (`finish_reason: length`), leaving `content`
          # empty; PR-Agent then crashes parsing the empty YAML
          # (`'NoneType' object is not subscriptable`) and posts no suggestions.
          # PR-Agent cannot disable Ollama thinking (it only forwards
          # `reasoning_effort` for OpenAI o3/o4-mini, and has no path to send
          # Ollama's native `think: false` flag).
          # qwen3-coder-next is non-thinking, so output budget goes to the answer.
          config.model: "ollama_chat/qwen3-coder-next:cloud"
          config.fallback_models: '["ollama_chat/qwen3-coder-next:cloud"]'
          # Both must be set: `custom_model_max_tokens` fills in for unknown models,
          # but `pr_agent.algo.utils.get_max_tokens` then caps it via
          # `min(max_model_tokens, custom_model_max_tokens)`. The default
          # `max_model_tokens=32000` silently truncates diffs >32K tokens, producing
          # malformed prompts that cause Ollama Cloud to hang.
          config.custom_model_max_tokens: "262144"
          config.max_model_tokens: "262144"
          config.duplicate_examples: "true"
          config.ai_timeout: "600"
          ollama.api_base: "https://ollama.com"
          ollama.api_key: ${{ secrets.OLLAMA_API_KEY }}

          # Tool toggles
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened","reopened","ready_for_review"]'

          # Repo-aware review focus
          pr_reviewer.extra_instructions: >-
            GridFleet is a multi-component monorepo (backend FastAPI/Python 3.12,
            agent FastAPI/Python 3.12, frontend React 19/TS, testkit). Specifically flag:
            (1) driver-specific branching in core code (e.g. `if pack_id == "..."`)
            that should live in driver-pack manifests or adapters;
            (2) direct writes to `Device.operational_state` / `Device.hold` /
            `Device.lifecycle_policy_state` outside the
            `app.devices.services.lifecycle_state_machine.DeviceStateMachine.transition`
            path;
            (3) missing `lock_device` / `lock_devices` row locks around device-state
            mutations;
            (4) direct writes to `AppiumNode.desired_state` outside
            `app.appium_nodes.services.desired_state_writer.write_desired_state`;
            (5) leader-loop pattern violations (bare `asyncio.create_task` background
            loops instead of leader-leased loops);
            (6) missing Alembic revisions for SQLAlchemy model changes.
          pr_code_suggestions.num_code_suggestions: "4"
