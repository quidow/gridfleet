name: Ollama PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ollama-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Ollama Review
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} --patch > pr.patch
          wc -l pr.patch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Ollama review
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'gpt-oss:120b' }}
          OLLAMA_URL: ${{ vars.OLLAMA_URL || 'https://ollama.com/api/chat' }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
          OLLAMA_REVIEW_DEBUG: ${{ vars.OLLAMA_REVIEW_DEBUG || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/ollama_review.py
