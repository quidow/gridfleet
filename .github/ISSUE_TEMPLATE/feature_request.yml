name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation is this about?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like GridFleet to do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Agent
        - Frontend
        - Driver packs/adapters
        - Testkit/e2e examples
        - Docker/deployment
        - Documentation
        - Unsure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: security
    attributes:
      label: Security or operational impact
      description: Note any impact on auth, agents, host execution, terminal access, uploads, networking, or data retention.
