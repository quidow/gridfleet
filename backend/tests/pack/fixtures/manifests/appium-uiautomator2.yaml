schema_version: 1
id: appium-uiautomator2
release: 2026.04.0
display_name: Appium UiAutomator2
maintainer: gridfleet-team
license: Apache-2.0
appium_server:
  source: npm
  package: appium
  version: ">=2.5,<3"
  recommended: "2.11.5"
  known_bad: []
appium_driver:
  source: npm
  package: appium-uiautomator2-driver
  version: ">=3,<5"
  recommended: "3.6.0"
  known_bad: []
insecure_features:
  - uiautomator2:chromedriver_autodownload
platforms:
  - id: android_tv
    display_name: "Android TV"
    automation_name: UiAutomator2
    appium_platform_name: Android
    device_types: [real_device, emulator]
    connection_types: [usb, network, virtual]
    grid_slots: [native, chrome]
    capabilities:
      stereotype:
        "appium:platformName": "Android"
        "appium:automationName": "UiAutomator2"
      session_required: []
    identity:
      scheme: android_serial
      scope: host
    display:
      icon_kind: tv
    health_checks:
      - id: adb_connected
        label: ADB Connected
      - id: adb_responsive
        label: ADB Responsive
      - id: boot_completed
        label: Boot Completed
      - id: ping
        label: IP Reachable
    lifecycle_actions:
      - id: state
      - id: reconnect
    connection_behavior:
      default_device_type: real_device
      default_connection_type: usb
      requires_ip_address: false
      requires_connection_target: true
      allow_transport_identity_until_host_resolution: true
      host_resolution_action: resolve
    device_type_overrides:
      emulator:
        lifecycle_actions:
          - id: state
          - id: boot
          - id: shutdown
        connection_behavior:
          default_device_type: emulator
          default_connection_type: virtual
          requires_ip_address: false
          requires_connection_target: true
    parallel_resources:
      ports:
        - capability_name: "appium:systemPort"
          start: 8200
        - capability_name: "appium:chromedriverPort"
          start: 9515
        - capability_name: "appium:mjpegServerPort"
          start: 9200
      derived_data_path: false
  - id: android_mobile
    display_name: "Android"
    automation_name: UiAutomator2
    appium_platform_name: Android
    device_types: [real_device, emulator]
    connection_types: [usb, network, virtual]
    grid_slots: [native, chrome]
    capabilities:
