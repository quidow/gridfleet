[project]
name = "gridfleet-backend"
version = "0.3.0"
description = "GridFleet backend — FastAPI + SQLAlchemy"
license = "Apache-2.0"
authors = [{ name = "GridFleet contributors" }]
requires-python = ">=3.14"
dependencies = [
    "fastapi==0.138.0",
    "uvicorn[standard]==0.49.0",
    "sqlalchemy[asyncio]==2.0.51",
    "asyncpg==0.31.0",
    "pydantic-settings==2.14.2",
    "alembic==1.18.4",
    "greenlet==3.5.2",
    "httpx2==2.4.0",
    "sse-starlette==3.4.5",
    "prometheus-client==0.25.0",
    "structlog==26.1.0",
    "pyyaml==6.0.3",
    "packaging>=26.2",
    "python-multipart>=0.0.32",
    "tenacity>=9.0,<10",
    "PyJWT>=2.10,<3",
]

[project.urls]
Homepage = "https://github.com/quidow/gridfleet"
Repository = "https://github.com/quidow/gridfleet"
Documentation = "https://github.com/quidow/gridfleet/tree/main/docs"
Issues = "https://github.com/quidow/gridfleet/issues"
Security = "https://github.com/quidow/gridfleet/security/advisories/new"

[project.optional-dependencies]
dev = [
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
    "pytest-xdist>=3.6.0",
    "mypy>=2.1.0",
    "ruff>=0.15.18",
    "datamodel-code-generator==0.65.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "db: test uses the backend Postgres test database",
]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["alembic.*"]
ignore_errors = true

[[tool.mypy.overrides]]
module = "app.agent_comm.generated"
ignore_errors = true

[tool.ruff]
target-version = "py314"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "BLE", "SIM", "TC", "RUF", "ANN", "PLC0415"]
ignore = ["B008"]

[tool.ruff.lint.flake8-type-checking]
# Pydantic resolves model field annotations at runtime when building the schema,
# so type-only imports used in BaseModel/BaseSettings field types must stay at
# module scope. ruff's intended mechanism for this (instead of per-import noqas).
# NOT including SQLAlchemy's DeclarativeBase here on purpose: this codebase keeps
# relationship-target imports inside `if TYPE_CHECKING:` (registry-resolved string
# forward refs), and exempting the base would wrongly flag those as TC004. SQLAlchemy
# Mapped[<concrete type>] column imports stay handled by per-import `# noqa: TC003`.
runtime-evaluated-base-classes = ["pydantic.BaseModel", "pydantic_settings.BaseSettings"]

[tool.ruff.lint.per-file-ignores]
# FastAPI resolves endpoint Annotated deps and response types at runtime via
# get_type_hints, so type-only imports in router modules can't move to TYPE_CHECKING.
"app/**/router*.py" = ["TC001", "TC002", "TC003"]
"app/**/routers/*.py" = ["TC001", "TC002", "TC003"]
"tests/**" = ["PLC0415"]  # tests often need lazy imports for fixture and patch ordering
"tests/packs/test_start_payload_integration.py" = ["ANN401"]  # *args/**kwargs shims need Any
"app/agent_comm/generated.py" = ["ALL"]  # auto-generated — do not lint

[tool.ruff.format]
quote-style = "double"

[dependency-groups]
dev = [
    "types-pyyaml>=6.0.12.20260518",
    "vulture>=2.16",
]
