[project]
name = "gridfleet-backend"
version = "0.1.0"
description = "GridFleet backend — FastAPI + SQLAlchemy"
license = "Apache-2.0"
authors = [{ name = "GridFleet contributors" }]
requires-python = ">=3.12"
dependencies = [
    "fastapi==0.136.1",
    "uvicorn[standard]==0.46.0",
    "websockets==16.0",
    "sqlalchemy[asyncio]==2.0.49",
    "asyncpg==0.31.0",
    "pydantic-settings==2.14.1",
    "alembic==1.18.4",
    "greenlet==3.5.0",
    "httpx==0.28.1",
    "sse-starlette==3.4.4",
    "prometheus-client==0.25.0",
    "structlog==25.5.0",
    "pyyaml==6.0.3",
    "packaging>=26.2",
    "python-multipart>=0.0.28",
    "tenacity>=9.0,<10",
    "PyJWT>=2.10,<3",
]

[project.urls]
Homepage = "https://github.com/quidow/gridfleet"
Repository = "https://github.com/quidow/gridfleet"
Documentation = "https://github.com/quidow/gridfleet/tree/main/docs"
Issues = "https://github.com/quidow/gridfleet/issues"
Security = "https://github.com/quidow/gridfleet/security/advisories/new"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=0.23",
    "pytest-cov>=6.0",
    "pytest-xdist>=3.6.0",
    "mypy>=2.1.0",
    "ruff>=0.15.12",
    "datamodel-code-generator==0.57.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "db: test uses the backend Postgres test database",
]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["alembic.*"]
ignore_errors = true

[[tool.mypy.overrides]]
module = "app.agent_comm.generated"
ignore_errors = true

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "BLE", "SIM", "TCH", "RUF", "ANN", "PLC0415"]
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
"app/models/*.py" = ["TCH003"]  # SQLAlchemy Mapped[] needs runtime types even with PEP 563
"app/routers/*.py" = ["TC001"]  # FastAPI inspects Annotated deps at runtime; TC001 is a false positive
"tests/**" = ["PLC0415"]  # tests often need lazy imports for fixture and patch ordering
"tests/pack/test_start_payload_integration.py" = ["ANN401"]  # *args/**kwargs shims need Any
"app/agent_comm/generated.py" = ["ALL"]  # auto-generated — do not lint

[tool.ruff.format]
quote-style = "double"

[tool.coverage.run]
source = ["app"]

[tool.coverage.report]
fail_under = 99.0
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ ==",
]

[dependency-groups]
dev = [
    "types-pyyaml>=6.0.12.20260510",
    "vulture>=2.16",
]
